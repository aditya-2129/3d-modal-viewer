version: "3.9"

services:
  cad-redis:
    image: redis:7-alpine
    command: redis-server --requirepass securepassword123
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - cad-redis
    volumes:
      - uploads:/uploads
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:securepassword123@localhost:6379}
      UPLOAD_DIR: ${UPLOAD_DIR:-/uploads}

  worker:
    build: .
    restart: unless-stopped
    command: npx tsx workers/freecad.worker.ts
    depends_on:
      - cad-redis
    volumes:
      - uploads:/uploads
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:securepassword123@localhost:6379}
      UPLOAD_DIR: ${UPLOAD_DIR:-/uploads}

volumes:
  redis_data:
  uploads:

networks:
  default:
    name: cad-app-network
