version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass securepassword123
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - redis
    volumes:
      - uploads:/uploads
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL}
      UPLOAD_DIR: ${UPLOAD_DIR}

  worker:
    build: .
    restart: unless-stopped
    command: npx tsx workers/freecad.worker.ts
    depends_on:
      - redis
    volumes:
      - uploads:/uploads
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL}
      UPLOAD_DIR: ${UPLOAD_DIR}

volumes:
  redis_data:
  uploads:
